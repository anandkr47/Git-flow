<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Code Flowchart Generator</title>
    <style>
        body {
            width: 300px;
            padding: 15px;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        select, input[type="checkbox"] {
            margin-bottom: 10px;
        }
        button {
            background: #2ea44f;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background: #2c974b;
        }
        #status {
            color: #2ea44f;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h2>Flowchart Settings</h2>
    <form id="settings-form">
        <div class="form-group">
            <label for="theme">Theme:</label>
            <select id="theme">
                <option value="light">Light</option>
                <option value="dark">Dark</option>
                <option value="github">GitHub</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="detail-level">Detail Level:</label>
            <select id="detail-level">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>
                <input type="checkbox" id="auto-generate">
                Auto-generate flowcharts
            </label>
        </div>
        
        <button type="submit">Save Settings</button>
        <div id="status"></div>
    </form>
    <script src="../dist/popup.js"></script>
</body>
</html>
